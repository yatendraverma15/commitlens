<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommitLens — QA Commit Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f172a;
      color: #fff;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: 0.4rem; color: #94a3b8; font-size: 0.95rem; }

    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 2rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      padding: 1.5rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    label { font-size: 0.85rem; font-weight: 500; color: #64748b; }
    input[type="text"], input[type="number"] {
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input:focus { border-color: #6366f1; }

    .radio-group {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
    }

    #sha-field, #n-field { transition: opacity 0.15s; }
    .hidden { display: none !important; }

    button#analyze-btn {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    button#analyze-btn:hover:not(:disabled) { background: #4f46e5; }
    button#analyze-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #action-bar { display: none; justify-content: flex-end; gap: 0.75rem; margin-bottom: 0.5rem; }

    .commit-header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .copy-commit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .copy-commit-btn:hover { background: #4f46e5; }
    .copy-commit-btn:active { transform: scale(0.95); }
    .copy-commit-btn.copied { background: #15803d; }
    .copy-commit-btn svg { width: 13px; height: 13px; }

    #empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 2.5rem 1rem;
      font-size: 0.95rem;
    }

    #results-section { display: flex; flex-direction: column; gap: 1.25rem; }

    .commit-card { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
    .commit-header {
      background: #f8fafc;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .commit-header .sha { font-family: monospace; font-size: 0.85rem; color: #6366f1; font-weight: 600; }
    .commit-header .meta { font-size: 0.8rem; color: #64748b; }
    .commit-header .toggle { color: #94a3b8; font-size: 1.1rem; }
    .commit-body { padding: 1.1rem; display: flex; flex-direction: column; gap: 1rem; }

    .commit-msg { font-size: 0.9rem; color: #334155; font-style: italic; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }

    .qa-summary { font-size: 0.9rem; color: #334155; line-height: 1.6; }

    .risk-badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .risk-low      { background: #dcfce7; color: #15803d; }
    .risk-medium   { background: #ffedd5; color: #c2410c; }
    .risk-high     { background: #fee2e2; color: #b91c1c; }
    .risk-critical { background: #7f1d1d; color: #fecaca; }

    .risk-reasoning { font-size: 0.82rem; color: #64748b; margin-top: 0.4rem; font-style: italic; }

    ul.bullet-list, ol.numbered-list {
      padding-left: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    ul.bullet-list li, ol.numbered-list li { font-size: 0.88rem; color: #334155; line-height: 1.5; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
    }

    .spinner-wrap { text-align: center; padding: 2rem; color: #64748b; font-size: 0.9rem; }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-secondary {
      padding: 0.45rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #475569;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f1f5f9; }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    footer a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <h1>CommitLens</h1>
    <p>Analyze commits and generate QA insights instantly</p>
  </header>

  <main>
    <div class="card">
      <h2>Analyze Commits</h2>

      <div class="field">
        <label for="repo-url">GitHub Repository URL</label>
        <input type="text" id="repo-url" placeholder="https://github.com/owner/repo" />
      </div>

      <div class="radio-group">
        <label>
          <input type="radio" name="mode" value="specific" checked />
          Specific Commit
        </label>
        <label>
          <input type="radio" name="mode" value="last-n" />
          Last N Commits
        </label>
      </div>

      <div id="sha-field" class="field">
        <label for="commit-sha">Commit SHA</label>
        <input type="text" id="commit-sha" placeholder="e.g. a1b2c3d" />
      </div>

      <div id="n-field" class="field hidden">
        <label for="commit-count">Number of Commits (1–10)</label>
        <input type="number" id="commit-count" min="1" max="10" value="5" />
      </div>

      <button id="analyze-btn">Analyze</button>
    </div>

    <div class="card" id="output-card">
      <div id="action-bar">
        <button class="btn-secondary" id="clear-btn">Clear</button>
      </div>
      <div id="empty-state">Enter a GitHub repo URL and commit details to get started.</div>
      <div id="results-section" class="hidden"></div>
    </div>
  </main>

  <footer>
    Powered by <a href="https://www.anthropic.com" target="_blank">Claude</a> &amp; GitHub API
  </footer>

  <script>
    // --- UI mode toggle ---
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener("change", () => {
        const specific = radio.value === "specific";
        document.getElementById("sha-field").classList.toggle("hidden", !specific);
        document.getElementById("n-field").classList.toggle("hidden", specific);
      });
    });

    // --- Display helpers ---
    const MAX_RESULTS = 5;

    function setActionBar(visible) {
      document.getElementById("action-bar").style.display = visible ? "flex" : "none";
    }

    function showEmpty() {
      document.getElementById("empty-state").classList.remove("hidden");
      const sec = document.getElementById("results-section");
      sec.classList.add("hidden");
      sec.innerHTML = "";
      setActionBar(false);
    }

    function removeTransient() {
      const sec = document.getElementById("results-section");
      sec.querySelector(".spinner-wrap")?.remove();
      sec.querySelector(".error-msg")?.remove();
    }

    function showSpinner(msg) {
      document.getElementById("empty-state").classList.add("hidden");
      const sec = document.getElementById("results-section");
      sec.classList.remove("hidden");
      removeTransient();
      const el = document.createElement("div");
      el.className = "spinner-wrap";
      el.innerHTML = `<span class="spinner"></span>${escapeHtml(msg)}`;
      sec.insertBefore(el, sec.firstChild);
    }

    function showError(msg) {
      document.getElementById("empty-state").classList.add("hidden");
      const sec = document.getElementById("results-section");
      sec.classList.remove("hidden");
      removeTransient();
      const el = document.createElement("div");
      el.className = "error-msg";
      el.textContent = msg;
      sec.insertBefore(el, sec.firstChild);
    }

    function trimResults() {
      const sec = document.getElementById("results-section");
      const cards = sec.querySelectorAll(".commit-card");
      for (let i = MAX_RESULTS; i < cards.length; i++) cards[i].remove();
    }

    function riskClass(level) {
      return { Low: "risk-low", Medium: "risk-medium", High: "risk-high", Critical: "risk-critical" }[level] ?? "risk-medium";
    }

    function renderList(items, ordered) {
      const tag = ordered ? "ol" : "ul";
      const cls = ordered ? "numbered-list" : "bullet-list";
      if (!items || items.length === 0) return `<div style="color:#94a3b8;font-size:0.85rem;">None.</div>`;
      return `<${tag} class="${cls}">${items.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</${tag}>`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderCommitCard(commit, analysis) {
      const shortSha = commit.sha.slice(0, 7);
      const risk = analysis.risk_level ?? "Medium";
      const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
      return `
        <div class="commit-card">
          <div class="commit-header" onclick="if (event.target.closest('.copy-commit-btn')) return; this.nextElementSibling.classList.toggle('hidden');">
            <span class="sha">${shortSha}</span>
            <span class="meta">${escapeHtml(commit.author)} &middot; ${new Date(commit.date).toLocaleDateString()}</span>
            <div class="commit-header-right">
              <button class="copy-commit-btn" type="button" title="Copy this commit's analysis" onclick="copyCommitCard(this)">
                ${copyIcon}<span>Copy</span>
              </button>
              <span class="toggle">&#9660;</span>
            </div>
          </div>
          <div class="commit-body">
            <div class="commit-msg">"${escapeHtml(commit.message)}"</div>

            <div>
              <div class="section-label">QA Summary</div>
              <div class="qa-summary">${escapeHtml(analysis.qa_summary ?? "—")}</div>
            </div>

            <div>
              <div class="section-label">Risk Level</div>
              <span class="risk-badge ${riskClass(risk)}">${risk}</span>
              <div class="risk-reasoning">${escapeHtml(analysis.risk_reasoning ?? "")}</div>
            </div>

            <div>
              <div class="section-label">Impacted Functional Areas</div>
              ${renderList(analysis.impacted_areas, false)}
            </div>

            <div>
              <div class="section-label">Areas Needing Testing</div>
              ${renderList(analysis.areas_needing_testing, false)}
            </div>

            <div>
              <div class="section-label">Test Scenario Suggestions</div>
              ${renderList(analysis.test_scenarios, true)}
            </div>
          </div>
        </div>`;
    }

    // --- Clear ---
    document.getElementById("clear-btn").addEventListener("click", () => {
      document.getElementById("repo-url").value = "";
      document.getElementById("commit-sha").value = "";
      document.getElementById("commit-count").value = "5";
      document.querySelector('input[name="mode"][value="specific"]').checked = true;
      document.getElementById("sha-field").classList.remove("hidden");
      document.getElementById("n-field").classList.add("hidden");
      showEmpty();
    });

    // --- Per-commit copy ---
    function copyCommitCard(btn) {
      const card = btn.closest(".commit-card");
      if (!card) return;
      const sha  = card.querySelector(".sha")?.textContent ?? "";
      const meta = card.querySelector(".meta")?.textContent ?? "";
      const msg  = card.querySelector(".commit-msg")?.textContent?.trim() ?? "";
      const body = card.querySelector(".commit-body");
      const lines = [`=== Commit ${sha} — ${meta} ===`, msg];
      body.querySelectorAll(".section-label").forEach(label => {
        lines.push(`\n${label.textContent}`);
        const next = label.nextElementSibling;
        if (next) lines.push(next.textContent.trim());
      });
      navigator.clipboard.writeText(lines.join("\n")).then(() => {
        const span = btn.querySelector("span");
        const orig = span.textContent;
        span.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { span.textContent = orig; btn.classList.remove("copied"); }, 2000);
      });
    }

    // --- Analyze button ---
    document.getElementById("analyze-btn").addEventListener("click", async () => {
      const repoUrl = document.getElementById("repo-url").value.trim();
      const mode    = document.querySelector('input[name="mode"]:checked').value;
      const btn     = document.getElementById("analyze-btn");

      if (!repoUrl) { showError("Please enter a GitHub repository URL."); return; }

      let payload = { repo_url: repoUrl, mode };
      if (mode === "specific") {
        const sha = document.getElementById("commit-sha").value.trim();
        if (!sha) { showError("Please enter a commit SHA."); return; }
        payload.sha = sha;
      } else {
        payload.count = parseInt(document.getElementById("commit-count").value) || 5;
      }

      btn.disabled = true;
      showSpinner("Fetching commits and analyzing with Claude… this can take 10–60 seconds.");

      try {
        const res  = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error ?? "Analysis failed.");
          return;
        }

        removeTransient();

        const results = document.getElementById("results-section");
        document.getElementById("empty-state").classList.add("hidden");
        results.classList.remove("hidden");

        // Dedupe: if a new commit matches an existing card's SHA, drop the old card.
        const incomingShas = new Set(data.results.map(r => r.commit.sha.slice(0, 7)));
        results.querySelectorAll(".commit-card").forEach(card => {
          const sha = card.querySelector(".sha")?.textContent;
          if (sha && incomingShas.has(sha)) card.remove();
        });

        // Prepend newest-first so order within the batch is preserved.
        const tmp = document.createElement("div");
        tmp.innerHTML = data.results
          .map(({ commit, analysis }) => renderCommitCard(commit, analysis))
          .join("");
        Array.from(tmp.children).reverse().forEach(card => {
          results.insertBefore(card, results.firstChild);
        });

        trimResults();
        setActionBar(true);
      } catch (e) {
        showError("Could not reach the server. Is the Flask app running?");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
